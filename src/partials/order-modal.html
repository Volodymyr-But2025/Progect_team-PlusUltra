<div class="order-backdrop">
  <div class="order-modal-overlay">
    <button type="button" class="modal-close-button">
      <svg class="close-button" width="32" height="32">
        <use href="./favicon.svg#icon-x"></use>
      </svg>
    </button>
    <p class="order-modal-title">Замовити</p>
    <form class="order-form" id="order-form">
      <label for="name"
        >Ім’я*
        <input type="text" id="name" placeholder="Дмитро" required autofocus />
      </label>
      <label for="phone"
        >Телефон*
        <input type="tel" id="phone" placeholder="38 099 123 22 11" required />
      </label>
      <label for="comment"
        >Коментар
        <textarea
          type="text"
          id="comment"
          placeholder="Введіть ваш коментар"
        ></textarea>
      </label>
      <button type="submit" class="order-button" disabled>
        Надіслати заявку
      </button>
    </form>
  </div>
</div>
<script type="module" src="../js/order-modal.js"></script>
